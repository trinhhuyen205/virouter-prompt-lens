<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Virouter Prompt Lens</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <img src="icons/icon-128.png" alt="" class="logo">
      <div>
        <p class="kicker">Virouter</p>
        <h1>Prompt Lens</h1>
        <p class="lede">Image to prompt, powered by your own API.</p>
      </div>
    </header>

    <section class="card">
      <div class="row">
        <button id="openPanel" class="primary">Open panel</button>
        <button id="captureTab">Capture tab</button>
      </div>
      <label class="upload">
        <input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp">
        <span>Upload image and analyze</span>
      </label>
    </section>

    <section class="card">
      <h2>Settings</h2>
      <label>Virouter OpenAI-compatible Base URL<input id="baseUrl" placeholder="https://api.virouter.com/v1"></label>
      <label>Virouter API Key<input id="apiKey" placeholder="vr_sk_..." type="password"></label>
      <label>Prompt analysis model<input id="model" placeholder="gpt-5.4-mini"></label>
      <label>Image generation model<input id="imageModel" placeholder="gpt-image-2"></label>
      <div class="grid">
        <label>Image size<select id="imageSize"><option value="1024x1024">1024×1024</option><option value="1024x1536">1024×1536</option><option value="1536x1024">1536×1024</option></select></label>
        <label>Image quality<select id="imageQuality"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></label>
      </div>
      <label class="check"><input id="autoGenerateImage" type="checkbox"> Auto-generate image after prompt</label>
      <label>Enhancement mode<select id="enhancementMode">
        <option value="faithful">Faithful — preserve source closely</option>
        <option value="enhanced">Enhanced — improve quality &amp; polish</option>
        <option value="commercial">Commercial — ad-ready &amp; premium</option>
        <option value="cinematic">Cinematic — dramatic &amp; filmic</option>
        <option value="viral-social">Viral Social — bold &amp; scroll-stopping</option>
      </select></label>
      <div class="grid">
        <label>Language<select id="language"><option value="en">English</option><option value="vi">Vietnamese</option><option value="ja">Japanese</option></select></label>
        <label>Detail<select id="detailLevel"><option value="fast">Fast</option><option value="balanced">Balanced</option><option value="deep">Deep</option></select></label>
      </div>
      <label class="check"><input id="showOnAllSites" type="checkbox"> Show hover button on all sites <small>(requires host access permission)</small></label>
      <label class="check"><input id="saveHistory" type="checkbox"> Save local history</label>
      <button id="saveSettings" class="primary full">Save settings</button>
      <p id="status" class="status"></p>
    </section>

    <section class="card">
      <div class="row between"><h2>History</h2><button id="clearHistory" class="link">Clear</button></div>
      <div id="history" class="history"></div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
