<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Virouter Prompt Lens Settings</title><link rel="stylesheet" href="popup.css"></head><body><main class="shell wide"><header class="hero"><img src="icons/icon.svg" class="logo" alt=""><div><p class="kicker">Virouter</p><h1>Prompt Lens Settings</h1><p class="lede">Configure your OpenAI-compatible API endpoint.</p></div></header><section class="card"><label>Virouter OpenAI-compatible Base URL<input id="baseUrl" placeholder="https://api.virouter.com/v1"></label><label>Virouter API Key<input id="apiKey" placeholder="vr_sk_..." type="password"></label><label>Prompt analysis model<input id="model" placeholder="gpt-5.4-mini"></label><label>Image generation model<input id="imageModel" placeholder="gpt-image-2"></label><div class="grid"><label>Image size<select id="imageSize"><option value="1024x1024">1024×1024</option><option value="1024x1536">1024×1536</option><option value="1536x1024">1536×1024</option></select></label><label>Image quality<select id="imageQuality"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></label></div><label class="check"><input id="autoGenerateImage" type="checkbox"> Auto-generate image after prompt</label><div class="grid"><label>Language<select id="language"><option value="en">English</option><option value="vi">Vietnamese</option><option value="ja">Japanese</option></select></label><label>Detail<select id="detailLevel"><option value="fast">Fast</option><option value="balanced">Balanced</option><option value="deep">Deep</option></select></label></div><label class="check"><input id="saveHistory" type="checkbox"> Save local history</label><button id="saveSettings" class="primary full">Save settings</button><p id="status" class="status"></p></section></main><script src="popup.js"></script></body></html>
